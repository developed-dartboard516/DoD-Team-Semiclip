
///
/// 0 = everything is turned off for this map (including metamod forwards)
/// 1 = semiclip   is turned on  for this map ('pfnPM_Move()' is attached)
///
semiclip_enabled    "1"

///
/// 0 = 'pfnAddToFullPack_Post()' is turned off, semiclip works and there are no trans. effects
/// 1 = 'pfnAddToFullPack_Post()' is turned on,  semiclip works and trans. effects are on (depending on the distance between players)
/// 2 = 'pfnAddToFullPack_Post()' is turned on,  semiclip works and trans. effects are on (only while players collide)
/// 3 = same as 2, but without the "full transparency" thing (players will be moderately transparent depending on distance)
///
semiclip_style      "3"

///
/// a player can stand/ crouch/ jump on another player if "1"
///
semiclip_head       "1"

///
/// 0 = everyone pass through everyone
/// 1 = only team 1 (Allies/ British/ T) got semiclip
/// 2 = only team 2 (Axis/ CT) got semiclip
/// 3 = same as 0, but players are not able to pass through enemies
///
semiclip_team       "3"

///
/// if 'int edict_s::team' is not used for this game, use "'void* edict_s::pvPrivateData' + Offs" to receive a player's team index
/// for example, 114 is the team index offs. for 'cstrike', but if it still doesn't work, use 114*4 (456)
/// on linux 'cstrike', you may need 119 (a +5 addition), but if still doesn't work, use 119*4 (476)
/// if "0", 'int edict_s::team' is used (works on day of defeat)
///
semiclip_teamoffs   "0"

///
/// if "1", bugs related to entities like 'func_train' might get fixed
/// if "1", it patches a byte inside engine's "SV_ClipToLinks()" function
///
semiclip_patch      "1"

///
/// only considered if 'semiclip_style' is not "0"
///
/// if "0", once a player is dead, instantly turns off transparency effects
/// if "1", dead players having 'DEAD_DYING' flag on will still see transparency
/// if "2",	transparency will cease only when a player starts spectating someone else
///
semiclip_dying      "2"

///
/// only considered if semiclip_dying is set to "2"
///
/// if "1",  'pev_iuser1' will be the variable that stores the observer target
/// if "2",  'pev_iuser2' will be the variable that stores the observer target (day of defeat)
/// if "3",  'pev_iuser3' will be the variable that stores the observer target
/// if "4",  'pev_iuser4' will be the variable that stores the observer target
///
/// if "5",  'pev_euser1' will be the variable that stores the observer target
/// if "6",  'pev_euser2' will be the variable that stores the observer target
/// if "7",  'pev_euser3' will be the variable that stores the observer target
/// if "8",  'pev_euser4' will be the variable that stores the observer target
///
/// if "9",  'pvPrivateData + semiclip_obsoffs' will be the signed   1-byte variable that stores the observer target
/// if "10", 'pvPrivateData + semiclip_obsoffs' will be the unsigned 1-byte variable that stores the observer target
/// if "11", 'pvPrivateData + semiclip_obsoffs' will be the signed   2-byte variable that stores the observer target
/// if "12", 'pvPrivateData + semiclip_obsoffs' will be the unsigned 2-byte variable that stores the observer target
/// if "13", 'pvPrivateData + semiclip_obsoffs' will be the signed   4-byte variable that stores the observer target
/// if "14", 'pvPrivateData + semiclip_obsoffs' will be the unsigned 4-byte variable that stores the observer target
///
/// if "15", 'pvPrivateData + semiclip_obsoffs' will be the ::edict_s*     4-byte variable that stores the observer target
/// if "16", 'pvPrivateData + semiclip_obsoffs' will be the ::CBaseEntity* 4-byte variable that stores the observer target
/// if "17", 'pvPrivateData + semiclip_obsoffs' will be the ::entvars_s*   4-byte variable that stores the observer target
///
semiclip_observer   "2"

///
/// only considered if semiclip_dying is set to "2"
/// only considered if semiclip_observer is set to a value above "8"
///
/// "'void* edict_s::pvPrivateData' + semiclip_obsoffs" will be considered the variable that stores the observer target
///
/// see remarks enumerated @ 'semiclip_teamoffs'
///
semiclip_obsoffs    "0"
